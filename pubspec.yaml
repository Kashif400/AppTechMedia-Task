name: clean_code_architecture_app
description: "A Flutter project with Clean Code Architecture and environment flavors."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.5.3
  
  # Environment Configuration
  flutter_dotenv: ^5.2.1
  
  # Routing
  go_router: ^17.0.1

  # Dependency Injection
  get_it: ^9.2.0

  # Functional Programming
  dartz: ^0.10.1
  
  # HTTP & Network
  http: ^1.2.0
  dio: ^5.6.0
  
  # Connectivity
  connectivity_plus: ^6.0.0
  
  # Biometric Authentication
  local_auth: ^2.1.8

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any
  
  # UI Components
  flutter_svg: ^2.2.3
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  
  # Logging
  talker_logger: ^5.1.12
  talker_dio_logger: ^5.1.12
  talker_bloc_logger: ^5.1.12
  
  # Utilities
  device_info_plus: ^10.1.2
  flutter_image_compress: ^2.3.0
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.4
  
  # Firebase & Notifications
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  rxdart: ^0.28.0
  
  # Payments
  flutter_stripe: ^11.3.0
  
  # Code Generation
  freezed_annotation: ^2.4.4
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.5.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  json_serializable: ^6.8.0
  freezed: ^2.4.7
  
  # Code generation for freezed models
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/static_images/
    - assets/temp/
    - .env
    - assets/logos/
    - assets/animations/
    - assets/config/

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  adaptive_icon_foreground: "assets/logos/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  ios: true
  image_path: "assets/logos/app_icon.png"
  image_path_ios: "assets/logos/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# Flutter Native Splash configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logos/app_icon.png
  color_dark: "#121212"
  image_dark: assets/logos/app_icon.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center

# Flutter Gen configuration
flutter_gen:
  output: lib/generated/
  line_length: 80

  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/color/colors.xml
